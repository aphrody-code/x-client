# SPDX-License-Identifier: Apache-2.0
# rust-toolchain.toml — hermetic Rust toolchain pin
#
# Pinning rationale:
#   - Reproducible builds (cf. docs/cargo/SECURITY-DEEP.md §6 pinned action SHAs)
#   - Cross-platform consistency (Linux #1, Win11 #2, WASM #3 per CLAUDE.md §0)
#   - Edition 2024 stabilises 2027 — until then, pin a known-good nightly
#
# Re-pin via:
#   curl -sSL https://api.github.com/repos/rust-lang/rust/branches/master | jq -r .commit.commit.author.date
#   then update the channel to `nightly-YYYY-MM-DD`

[toolchain]
channel = "nightly-2026-05-17"
components = ["rustfmt", "clippy", "rust-src", "rust-analyzer"]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "wasm32-unknown-unknown",
  "wasm32-wasip1",
]
profile = "minimal"
